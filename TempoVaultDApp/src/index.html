<!DOCTYPE html>
<html>
<head>
  <title>Tempo Token DApp</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>Tempo Token DApp</h1>

  <button id="connectButton">Connect Wallet</button>
  <p>Connected Account: <span id="walletAddress">Not connected</span></p>

  <h2>Balances</h2>
  <p>Tempo Token Balance: <span id="tokenBalance">0</span></p>
  <p>Vault Share Balance: <span id="vaultBalance">0</span></p>
  <p>Governance Membership: <span id="membershipStatus">Unknown</span></p>

  <h2>Deposit</h2>
  <input id="depositAmount" type="number" placeholder="Amount">
  <button id="approveButton">Approve</button>
  <button id="depositButton">Deposit</button>

  <h2>Withdraw</h2>
  <input id="withdrawAmount" type="number" placeholder="Shares">
  <button id="withdrawButton">Withdraw</button>

  <h2>Admin</h2>
  <p>Admin Address: <span id="adminAddress">Unknown</span></p>
  <p>Admin Token Balance: <span id="adminBalance">0</span></p>
  <p>Withdrawal Fee: <span id="feePercent">0</span></p>

  <button id="refreshButton">Refresh</button>
  <p id="statusMessage"></p>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
